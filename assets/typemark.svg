<svg xmlns="http://www.w3.org/2000/svg" viewBox="30 20 340 360" width="400" height="400">
  <defs>
    <clipPath id="hex-clip">
      <polygon points="200.00,40.00 338.56,120.00 338.56,280.00 200.00,360.00 61.44,280.00 61.44,120.00"/>
    </clipPath>
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0e0638"/>
      <stop offset="28%"  stop-color="#1a2080"/>
      <stop offset="55%"  stop-color="#4a3a9a"/>
      <stop offset="78%"  stop-color="#7060b0"/>
      <stop offset="100%" stop-color="#2a1060"/>
    </linearGradient>
    <radialGradient id="shimmer-a" cx="30%" cy="25%" r="45%">
      <stop offset="0%"   stop-color="#a0c8f8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a0c8f8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shimmer-b" cx="72%" cy="75%" r="42%">
      <stop offset="0%"   stop-color="#d090f0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d090f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shimmer-c" cx="50%" cy="45%" r="30%">
      <stop offset="0%"   stop-color="#e8e0ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8e0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shimmer-d" cx="75%" cy="22%" r="38%">
      <stop offset="0%"   stop-color="#60b4e0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#60b4e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="center-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Gradient fill clipped to hexagon -->
  <g clip-path="url(#hex-clip)">
    <rect x="40" y="40" width="320" height="320" fill="url(#bg-main)"/>
    <rect x="40" y="40" width="320" height="320" fill="url(#shimmer-a)"/>
    <rect x="40" y="40" width="320" height="320" fill="url(#shimmer-b)"/>
    <rect x="40" y="40" width="320" height="320" fill="url(#shimmer-c)"/>
    <rect x="40" y="40" width="320" height="320" fill="url(#shimmer-d)"/>
  </g>

  <!-- 12 orchid lines with glow -->
  <g stroke="#C850C0" stroke-width="3" opacity="0.92" stroke-linecap="round" filter="url(#glow)">
    <line x1="200.00" y1="40.00" x2="338.56" y2="120.00"/>
    <line x1="338.56" y1="120.00" x2="338.56" y2="280.00"/>
    <line x1="338.56" y1="280.00" x2="200.00" y2="360.00"/>
    <line x1="200.00" y1="360.00" x2="61.44" y2="280.00"/>
    <line x1="61.44" y1="280.00" x2="61.44" y2="120.00"/>
    <line x1="61.44" y1="120.00" x2="200.00" y2="40.00"/>
    <line x1="200.00" y1="40.00" x2="338.56" y2="280.00"/>
    <line x1="338.56" y1="120.00" x2="200.00" y2="360.00"/>
    <line x1="338.56" y1="280.00" x2="61.44" y2="280.00"/>
    <line x1="200.00" y1="360.00" x2="61.44" y2="120.00"/>
    <line x1="61.44" y1="280.00" x2="200.00" y2="40.00"/>
    <line x1="61.44" y1="120.00" x2="338.56" y2="120.00"/>
  </g>

  <!-- Center pentagon with glow -->
  <polygon points="200.00,172.00 226.63,191.35 216.46,222.65 183.54,222.65 173.37,191.35" fill="#C850C0" opacity="0.95" filter="url(#center-glow)"/>

  <!-- Pentacle -->
  <line x1="200.00" y1="172.00" x2="216.46" y2="222.65" stroke="rgba(230,210,255,0.55)" stroke-width="1.1" opacity="0.8"/>
  <line x1="226.63" y1="191.35" x2="183.54" y2="222.65" stroke="rgba(230,210,255,0.55)" stroke-width="1.1" opacity="0.8"/>
  <line x1="216.46" y1="222.65" x2="173.37" y2="191.35" stroke="rgba(230,210,255,0.55)" stroke-width="1.1" opacity="0.8"/>
  <line x1="183.54" y1="222.65" x2="200.00" y2="172.00" stroke="rgba(230,210,255,0.55)" stroke-width="1.1" opacity="0.8"/>
  <line x1="173.37" y1="191.35" x2="226.63" y2="191.35" stroke="rgba(230,210,255,0.55)" stroke-width="1.1" opacity="0.8"/>
</svg>